<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>職安法規自動監控與鑑別系統 v4.5 - 合規風險管理</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #f8fafc;
        }
        .scan-line {
            height: 2px;
            background: linear-gradient(to right, transparent, #3b82f6, transparent);
            animation: scan 2s linear infinite;
        }
        @keyframes scan {
            0% { transform: translateY(-100%); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(100%); opacity: 0; }
        }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .new-badge { animation: blink 1.5s infinite; }
        @keyframes blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.95); }
        }
        .law-card-glow {
            border: 1px solid #e2e8f0;
            background-color: #ffffff;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .law-card-glow:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            border-color: #3b82f6;
        }
        .developer-tag { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 100; pointer-events: none; }
        
        /* 差異比對專用樣式 */
        .diff-added { background-color: #dcfce7; color: #166534; font-weight: bold; padding: 0 2px; }
        .diff-removed { background-color: #fee2e2; color: #991b1b; text-decoration: line-through; padding: 0 2px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('monitor');
            const [isSyncing, setIsSyncing] = useState(false);
            const [syncText, setSyncText] = useState('正在自動鑑別條文...');
            const [selectedLaw, setSelectedLaw] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [filterType, setFilterType] = useState('全部');

            const TODAY = new Date('2026-03-23');
            const UNIFIED_DATE = '2026-03-02'; 

            // 模擬法律數據
            const [laws, setLaws] = useState([
                { id: 1, name: '職業安全衛生法', type: '法律', remoteDate: '2025-12-19', localCheckDate: UNIFIED_DATE },
                { id: 2, name: '職業安全衛生法施行細則', type: '法規命令', remoteDate: '2020-02-27', localCheckDate: UNIFIED_DATE },
                { id: 3, name: '職業安全衛生管理辦法', type: '法規命令', remoteDate: '2022-01-05', localCheckDate: UNIFIED_DATE },
                { id: 4, name: '職業安全衛生設施規則', type: '法規命令', remoteDate: '2024-08-01', localCheckDate: UNIFIED_DATE },
                { id: 5, name: '職業安全衛生教育訓練規則', type: '法規命令', remoteDate: '2025-09-04', localCheckDate: UNIFIED_DATE }
            ]);

            // 模擬差異比對邏輯
            const generateDiff = (oldText, newText) => {
                // 這裡簡化模擬差異，實際開發可串接 diff 函式庫
                if (oldText === newText) return <span>{oldText}</span>;
                return (
                    <span>
                        {oldText.substring(0, 10)}
                        <span className="diff-removed">舊規定文字</span>
                        <span className="diff-added">新修訂條款</span>
                        {newText.substring(10, 20)}...
                    </span>
                );
            };

            const mockComparisonData = [
                { id: 'Art6', title: '第 6 條', old: '雇主應有符合標準之必要安全衛生設備...', new: '雇主應針對新興化學物質提供必要安全衛生設備...', impact: '需更新現場 SOP' },
                { id: 'Art12', title: '第 12 條', old: '對於監測結果應保存三年...', new: '對於監測結果應保存五年...', impact: '修正表單保存期限' }
            ];

            const handleExport = () => {
                const currentMonth = TODAY.getMonth() + 1;
                const quarter = Math.ceil(currentMonth / 3);
                const year = TODAY.getFullYear();
                const exportData = laws.map((law, index) => {
                    const status = getLawStatus(law.remoteDate, law.localCheckDate);
                    return {
                        "序號": index + 1,
                        "法規名稱": law.name,
                        "法規類別": law.type,
                        "全國法規日期": law.remoteDate,
                        "最近鑑別日期": law.localCheckDate,
                        "合規狀態": status.text
                    };
                });
                const worksheet = XLSX.utils.json_to_sheet(exportData);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "法規鑑別總表");
                XLSX.writeFile(workbook, `職安法規鑑別總表_${year}_Q${quarter}.xlsx`);
            };

            const getLawStatus = (remoteDate, localDate) => {
                const rDate = new Date(remoteDate);
                const lDate = localDate ? new Date(localDate) : new Date(0);
                if (rDate > lDate) return { code: 'danger', color: 'bg-rose-500', text: '需重新鑑別', icon: 'fa-triangle-exclamation' };
                return { code: 'success', color: 'bg-emerald-600', text: '鑑別完成', icon: 'fa-circle-check' };
            };

            const filteredLaws = useMemo(() => {
                return laws.filter(law => (filterType === '全部' || law.type === filterType) && law.name.includes(searchQuery));
            }, [searchQuery, filterType, laws]);

            const handleAutoSync = (lawId) => {
                setSyncText('正在自動鑑別條文...');
                setIsSyncing(true);
                setTimeout(() => {
                    setLaws(prev => prev.map(law => law.id === lawId ? { ...law, localCheckDate: TODAY.toISOString().split('T')[0] } : law));
                    setIsSyncing(false);
                }, 1000);
            };

            const startCompare = (law) => {
                setSyncText('正在讀取詳細對照資料...');
                setIsSyncing(true);
                setTimeout(() => {
                    setSelectedLaw(law);
                    setActiveTab('compare');
                    setIsSyncing(false);
                }, 800);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white/80 backdrop-blur-md border-b border-slate-200 px-8 py-4 flex justify-between items-center sticky top-0 z-40 shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 w-10 h-10 rounded-xl flex items-center justify-center text-white shadow-lg">
                                <i className="fas fa-shield-halved text-lg"></i>
                            </div>
                            <div>
                                <h1 className="text-lg font-black text-slate-800 leading-tight">職安法規自動監控系統 v4.5</h1>
                                <div className="text-[10px] text-emerald-500 font-bold uppercase tracking-widest">全國法規資料庫 API 連線中</div>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={handleExport} className="hidden lg:flex items-center gap-2 px-4 py-2 bg-slate-800 text-white rounded-xl text-xs font-black hover:bg-slate-900 shadow-md">
                                <i className="fas fa-file-export"></i> 匯出報表
                            </button>
                            <div className="hidden md:flex bg-slate-100 p-1 rounded-xl border border-slate-200">
                                {['全部', '法律', '法規命令'].map(type => (
                                    <button key={type} onClick={() => setFilterType(type)} className={`px-4 py-1.5 rounded-lg text-xs font-black transition-all ${filterType === type ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500'}`}>{type}</button>
                                ))}
                            </div>
                        </div>
                    </header>

                    {isSyncing && (
                        <div className="fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white p-12 rounded-[2.5rem] shadow-2xl relative overflow-hidden max-w-sm w-full mx-4 text-center">
                                <div className="scan-line absolute inset-0"></div>
                                <i className="fas fa-circle-notch text-5xl text-blue-600 animate-spin mb-6"></i>
                                <h3 className="text-xl font-black text-slate-800">{syncText}</h3>
                            </div>
                        </div>
                    )}

                    <main className="flex-1 p-6 md:p-8 overflow-y-auto">
                        <div className="max-w-6xl mx-auto">
                            {activeTab === 'monitor' ? (
                                <div className="fade-in space-y-4">
                                    {filteredLaws.map((law, index) => {
                                        const status = getLawStatus(law.remoteDate, law.localCheckDate);
                                        return (
                                            <div key={law.id} className="p-5 rounded-2xl flex flex-col lg:flex-row lg:items-center justify-between law-card-glow gap-6">
                                                <div className="flex gap-4 items-center flex-1">
                                                    <div className="w-12 h-12 rounded-2xl flex flex-col items-center justify-center bg-orange-400 text-white font-black text-xs">{index + 1}</div>
                                                    <div>
                                                        <h3 className="font-black text-slate-800">{law.name}</h3>
                                                        <div className="flex gap-4 text-[10px] font-bold mt-1 text-slate-500 uppercase">
                                                            <span>公佈: {law.remoteDate}</span>
                                                            <span className={status.code === 'danger' ? 'text-rose-500' : 'text-emerald-600'}>鑑別: {law.localCheckDate}</span>
                                                            <span className={`px-2 rounded ${status.code === 'danger' ? 'bg-rose-100 text-rose-600' : 'bg-emerald-100 text-emerald-600'}`}>{status.text}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="flex gap-3">
                                                    <button onClick={() => startCompare(law)} className="px-5 py-2 rounded-xl font-black text-xs bg-slate-100 hover:bg-slate-200">查看對照</button>
                                                    <button onClick={() => handleAutoSync(law.id)} className="px-5 py-2 rounded-xl font-black text-xs bg-blue-600 text-white shadow-lg hover:bg-blue-700">自動鑑別</button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            ) : (
                                <div className="fade-in space-y-6">
                                    <button onClick={() => setActiveTab('monitor')} className="flex items-center gap-2 text-sm font-black text-slate-500 hover:text-blue-600">
                                        <i className="fas fa-chevron-left"></i> 返回清單
                                    </button>
                                    
                                    <div className="bg-white rounded-[2.5rem] shadow-xl border border-slate-200 overflow-hidden">
                                        <div className="p-10 border-b border-slate-100 bg-slate-50/50">
                                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                                                <div>
                                                    <h2 className="text-2xl font-black text-slate-800">{selectedLaw?.name}</h2>
                                                    <p className="text-sm text-slate-500 font-bold mt-1">ISO 45001 條文異動分析報告</p>
                                                </div>
                                                <div className="flex gap-2">
                                                    <span className="px-4 py-2 bg-rose-100 text-rose-600 rounded-xl text-xs font-black">偵測到 2 處變更</span>
                                                    <button onClick={() => { handleAutoSync(selectedLaw.id); setActiveTab('monitor'); }} className="px-6 py-2 bg-blue-600 text-white rounded-xl text-xs font-black shadow-lg">確認鑑別更新</button>
                                                </div>
                                            </div>
                                        </div>
                                        
                                        <div className="p-8">
                                            <div className="overflow-hidden rounded-2xl border border-slate-200 shadow-sm">
                                                <table className="w-full text-left border-collapse">
                                                    <thead>
                                                        <tr className="bg-slate-800 text-white text-xs font-black uppercase">
                                                            <th className="p-4 w-20">條號</th>
                                                            <th className="p-4">前次鑑別內容 ({selectedLaw?.localCheckDate})</th>
                                                            <th className="p-4">最新 API 內容 ({selectedLaw?.remoteDate})</th>
                                                            <th className="p-4 w-32 text-center">影響評估</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-slate-100">
                                                        {mockComparisonData.map(item => (
                                                            <tr key={item.id} className="hover:bg-slate-50 transition-colors">
                                                                <td className="p-4 font-black text-slate-700">{item.title}</td>
                                                                <td className="p-4 text-xs leading-relaxed text-slate-400 italic">{item.old}</td>
                                                                <td className="p-4 text-xs leading-relaxed text-slate-800 font-medium">
                                                                    {generateDiff(item.old, item.new)}
                                                                </td>
                                                                <td className="p-4 text-center">
                                                                    <span className="px-3 py-1 bg-amber-100 text-amber-700 rounded-lg text-[10px] font-black">{item.impact}</span>
                                                                </td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                            
                                            <div className="mt-8 p-6 bg-blue-50 border border-blue-100 rounded-3xl flex items-center gap-4">
                                                <div className="w-12 h-12 rounded-full bg-blue-600 text-white flex items-center justify-center shadow-lg animate-pulse">
                                                    <i className="fas fa-robot"></i>
                                                </div>
                                                <div>
                                                    <h4 className="text-sm font-black text-blue-900 uppercase">AI 鑑別總結</h4>
                                                    <p className="text-xs text-blue-700 font-bold mt-0.5">本次更新主要涉及「保存期限」與「新興物質監控」，建議於下次委員會更新 OSH 管理手冊。</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    <div className="developer-tag opacity-60">
                        <div className="bg-slate-900 text-white px-4 py-2 rounded-2xl text-[10px] font-black tracking-widest border border-white/10">
                            SYSTEM DEVELOPER BY SAM SUN
                        </div>
                    </div>

                    <footer className="px-8 py-3 bg-white border-t border-slate-200 flex justify-between items-center text-[9px] font-black text-slate-400 uppercase">
                        <div>資料來源：全國法規資料庫 API</div>
                        <div>版本：v4.5 (Built-in Diff Engine)</div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
